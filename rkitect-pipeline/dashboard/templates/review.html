<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rkitect.ai · Review Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-mono min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-white">Review Queue</h1>
        <p class="text-gray-500 text-sm">Approve generates video · Reject discards · Publish separately</p>
      </div>
      <div class="flex flex-wrap items-center gap-3">
        <button onclick="load()"
          class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white text-sm rounded-lg transition border border-gray-700">
          Refresh Now
        </button>
        <a href="/templates"
          class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white text-sm rounded-lg transition border border-gray-700">
          Template Launcher
        </a>
        <a href="/"
          class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white text-sm rounded-lg transition border border-gray-700">
          Back to Dashboard
        </a>
        <button onclick="toggleAutoPublish()"
          id="auto-publish-btn"
          class="px-4 py-2 text-sm rounded-lg transition border border-gray-700">
          Auto Publish: ...
        </button>
      </div>
    </div>

    <div id="summary" class="grid gap-4 md:grid-cols-3 mb-8"></div>

    <div id="loading" class="text-center py-20 text-gray-600">Loading review queue...</div>

    <div id="queue" class="hidden space-y-4"></div>
  </div>

  <script>
    let publishSettings = { auto_publish: false };
    // Cache the last queue payload so a re-render after panel close works without a new fetch.
    let _lastQueueItems = [];

    function _hasOpenFeedbackPanel() {
      return !!document.querySelector('[id^="feedback-panel-"]:not(.hidden)');
    }

    async function load() {
      try {
        const [queueRes, settingsRes] = await Promise.all([
          fetch("/api/review-queue", { credentials: 'include' }),
          fetch("/api/publish-settings", { credentials: 'include' }),
        ]);
        const queueData = await queueRes.json();
        publishSettings = await settingsRes.json();
        _lastQueueItems = queueData.items || [];

        document.getElementById("loading").classList.add("hidden");
        document.getElementById("queue").classList.remove("hidden");

        renderAutoPublishButton();
        renderSummary(queueData.count || 0);

        // Never blow away the queue DOM while a feedback panel is open —
        // that would destroy whatever the user has typed so far.
        if (!_hasOpenFeedbackPanel()) {
          renderQueue(_lastQueueItems);
        }
      } catch (e) {
        document.getElementById("loading").textContent = "Error loading queue: " + e.message;
      }
    }

    function renderAutoPublishButton() {
      const btn = document.getElementById("auto-publish-btn");
      const enabled = !!publishSettings.auto_publish;
      btn.textContent = enabled ? "Auto Publish: ON" : "Auto Publish: OFF";
      btn.className = enabled
        ? "px-4 py-2 text-sm rounded-lg transition border border-teal-500 bg-teal-500/10 text-teal-300"
        : "px-4 py-2 text-sm rounded-lg transition border border-red-500 bg-red-500/10 text-red-300";
    }

    function renderSummary(count) {
      const el = document.getElementById("summary");
      el.innerHTML = `
        <div class="bg-gray-900 rounded-xl p-5 border border-gray-800">
          <div class="text-xs text-gray-500 uppercase tracking-widest mb-2">Queued Posts</div>
          <div class="text-3xl font-bold text-white">${count}</div>
        </div>
        <div class="bg-gray-900 rounded-xl p-5 border border-gray-800">
          <div class="text-xs text-gray-500 uppercase tracking-widest mb-2">Publish Mode</div>
          <div class="text-lg font-semibold ${publishSettings.auto_publish ? 'text-teal-300' : 'text-red-300'}">${publishSettings.auto_publish ? 'Auto publish on' : 'Manual review on'}</div>
        </div>
        <div class="bg-gray-900 rounded-xl p-5 border border-gray-800">
          <div class="text-xs text-gray-500 uppercase tracking-widest mb-2">Workflow</div>
          <div class="text-sm text-gray-300">Approve = generate video + remove from queue. Reject = discard.</div>
        </div>`;
    }

    function renderQueue(items) {
      const el = document.getElementById("queue");
      if (!items.length) {
        el.innerHTML = '<div class="bg-gray-900 rounded-xl p-8 border border-gray-800 text-gray-500 text-sm">No posts are waiting for review.</div>';
        return;
      }

      el.innerHTML = items.map(item => {
        const hasImages = item.image_urls && item.image_urls.length > 0;
        const hasVideo = !!item.video_url;
        const tmpl = item.template_meta || null;
        const hasVideoDirection = tmpl && tmpl.video_transition;
        const videoMode = (tmpl && tmpl.video_generation_mode) || 'python';
        const videoLabel = videoMode === 'ai' ? '🎬 Generate Video (AI)' : '🎬 Generate Video';

        return `
        <div class="bg-gray-900 rounded-xl p-5 border border-gray-800" id="card-${item.id}">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between mb-4">
            <div>
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <span class="text-xs uppercase tracking-wide text-teal-400">${item.platform || 'buffer'}</span>
                <span class="text-xs px-2 py-1 rounded bg-gray-800 text-gray-400">${item.format || ''}</span>
                <span class="text-xs px-2 py-1 rounded bg-gray-800 text-gray-400">${item.pillar || ''}</span>
                <span class="text-xs px-2 py-1 rounded bg-gray-800 text-gray-400">Score ${item.score || 0}</span>
                ${hasVideoDirection ? `<span class="text-xs px-2 py-1 rounded bg-indigo-900/40 text-indigo-300 border border-indigo-800">${tmpl.video_transition} · ${videoMode}</span>` : ''}
              </div>
              <h2 class="text-lg font-semibold text-white mb-1">${escapeHtml(item.topic || 'Untitled topic')}</h2>
              <p class="text-sm text-gray-400">Created ${item.created_at || ''}</p>
            </div>
            <div class="flex flex-wrap gap-2">
              <button id="approve-btn-${item.id}" onclick="approveItem('${item.id}')" class="px-4 py-2 rounded-lg bg-teal-600 hover:bg-teal-500 text-sm text-white transition">${hasVideoDirection ? '✅ Approve + Video' : '✅ Approve'}</button>
              <button onclick="rejectItem('${item.id}')" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm text-white transition border border-gray-700">Reject</button>
              <button onclick="toggleFeedbackPanel('${item.id}', 'text')" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm text-yellow-300 transition border border-yellow-700 hover:border-yellow-500">💬 Text Feedback</button>
              ${hasImages ? `<button onclick="toggleFeedbackPanel('${item.id}', 'image')" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm text-purple-300 transition border border-purple-700 hover:border-purple-500">🖼 Image Feedback</button>` : ''}
              ${hasVideoDirection ? `<button id="gen-vid-btn-${item.id}" onclick="generateVideo('${item.id}')" class="px-4 py-2 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm text-indigo-300 transition border border-indigo-700 hover:border-indigo-500">${videoLabel}</button>` : ''}
            </div>
          </div>

          <!-- Generation status line (image/video progress) -->
          <div id="gen-status-${item.id}" class="hidden text-xs px-1 mb-3"></div>

          ${hasImages ? `
            <div class="mt-4" id="images-container-${item.id}">
              ${item.image_urls.length > 1 ? `
                <div class="flex gap-2 overflow-x-auto py-2">
                  ${item.image_urls.map(u => `
                    <img src="${u}" class="h-36 rounded-lg border border-gray-800 object-cover" />
                  `).join('')}
                </div>
              ` : `
                <div class="w-full rounded-lg overflow-hidden border border-gray-800">
                  <img src="${item.image_urls[0]}" class="w-full h-64 object-cover" />
                </div>
              `}
            </div>
          ` : `<div id="images-container-${item.id}"></div>`}

          ${hasVideo ? `
            <div class="mt-4" id="video-container-${item.id}">
              <div class="text-xs text-gray-500 uppercase tracking-widest mb-2">Generated Video</div>
              <video src="${item.video_url}" controls class="w-full rounded-lg border border-gray-800 max-h-96" style="background:#000;"></video>
            </div>
          ` : `<div id="video-container-${item.id}"></div>`}

          <div class="bg-gray-950 rounded-xl border border-gray-800 p-4 text-sm text-gray-300 leading-relaxed mt-4">${escapeHtml((item.preview_content || item.content || '').replace(/\[IMAGE BRIEF:[\s\S]*?\]$/i, '').trim())}</div>
          ${item.angle ? `<div class="mt-4 text-xs text-gray-500">Angle: ${escapeHtml(item.angle)}</div>` : ''}

          <!-- Per-item inline feedback panel (hidden by default) -->
          <!-- data-mode is set by toggleFeedbackPanel to "text" or "image" -->
          <div id="feedback-panel-${item.id}" class="hidden mt-4 border-t border-gray-800 pt-4" data-mode="text">
            <div id="feedback-panel-title-${item.id}" class="text-xs text-gray-500 uppercase tracking-widest mb-3">Text Feedback Loop</div>
            <div id="feedback-panel-desc-${item.id}" class="text-sm text-gray-400 mb-3">
              The post will be regenerated with your feedback as critique, then requeued for review.
              Feedback also updates the QA performance log and prompt history so the same mistake doesn't recur.
            </div>
            <textarea
              id="feedback-input-${item.id}"
              rows="4"
              class="w-full bg-gray-950 border border-gray-700 rounded-xl p-3 text-sm text-gray-100 focus:outline-none focus:border-yellow-500 mb-3"
              placeholder="What's wrong? What should change? Be specific — tone, structure, CTA, brand voice..."
            ></textarea>
            <div id="feedback-status-${item.id}" class="text-xs text-gray-500 mb-3"></div>
            <div class="flex gap-2">
              <button id="feedback-submit-${item.id}"
                onclick="submitItemFeedback('${item.id}', '${item.format}', '${escapeAttr(item.source_file || '')}')"
                class="px-4 py-2 rounded-lg bg-yellow-600 hover:bg-yellow-500 text-sm text-white transition">
                Apply feedback &amp; regenerate
              </button>
              <button onclick="toggleFeedbackPanel('${item.id}', null)"
                class="px-4 py-2 rounded-lg border border-gray-700 text-sm text-gray-300 hover:text-white transition">
                Cancel
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function escapeAttr(str) {
      return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // mode: "text" | "image" | null (null = close)
    function toggleFeedbackPanel(itemId, mode) {
      const panel = document.getElementById(`feedback-panel-${itemId}`);
      if (!panel) return;

      const currentMode = panel.getAttribute('data-mode');
      const isOpen = !panel.classList.contains('hidden');

      // Close if: null mode, or clicking same mode when open
      if (mode === null || (isOpen && mode === currentMode)) {
        panel.classList.add('hidden');
        const statusEl = document.getElementById(`feedback-status-${itemId}`);
        const inputEl = document.getElementById(`feedback-input-${itemId}`);
        if (statusEl) statusEl.textContent = '';
        if (inputEl) inputEl.value = '';
        // Re-render now that the panel is closed — applies any queue changes
        // that were held back while the user was typing.
        if (_lastQueueItems.length) renderQueue(_lastQueueItems);
        return;
      }

      // Switch mode or open
      panel.setAttribute('data-mode', mode);
      panel.classList.remove('hidden');

      const titleEl = document.getElementById(`feedback-panel-title-${itemId}`);
      const descEl = document.getElementById(`feedback-panel-desc-${itemId}`);
      const submitBtn = document.getElementById(`feedback-submit-${itemId}`);
      const inputEl = document.getElementById(`feedback-input-${itemId}`);

      if (mode === 'image') {
        if (titleEl) titleEl.textContent = '🖼 Image Feedback Loop';
        if (descEl) descEl.textContent = 'Describe what is wrong with the generated images. Feedback updates the image template file, the template_renderer prompt, and the skill performance log — so the same visual mistake is not repeated next run.';
        if (inputEl) { inputEl.placeholder = 'e.g. "Too dark — exterior needs golden hour lighting", "Building not visible enough", "Wrong material palette", "Slide 3 lost spatial identity"...'; }
        if (submitBtn) { submitBtn.textContent = 'Apply image feedback'; submitBtn.className = 'px-4 py-2 rounded-lg bg-purple-600 hover:bg-purple-500 text-sm text-white transition'; }
        submitBtn.onclick = () => submitImageFeedback(itemId);
      } else {
        if (titleEl) titleEl.textContent = '💬 Text Feedback Loop';
        if (descEl) descEl.textContent = 'The post will be regenerated with your feedback as critique, then requeued for review. Feedback also updates the QA performance log and prompt history so the same mistake doesn\'t recur.';
        if (inputEl) { inputEl.placeholder = "What's wrong? What should change? Be specific — tone, structure, CTA, brand voice..."; }
        if (submitBtn) { submitBtn.textContent = 'Apply feedback & regenerate'; submitBtn.className = 'px-4 py-2 rounded-lg bg-yellow-600 hover:bg-yellow-500 text-sm text-white transition'; }
        submitBtn.onclick = () => submitItemFeedback(itemId);
      }

      const statusEl = document.getElementById(`feedback-status-${itemId}`);
      if (statusEl) statusEl.textContent = '';
      if (inputEl) inputEl.value = '';
    }

    async function submitItemFeedback(itemId) {
      const inputEl = document.getElementById(`feedback-input-${itemId}`);
      const statusEl = document.getElementById(`feedback-status-${itemId}`);
      const feedback = (inputEl?.value || '').trim();

      if (!feedback) {
        if (statusEl) { statusEl.textContent = 'Add feedback before submitting.'; statusEl.className = 'text-xs text-red-400 mb-3'; }
        return;
      }

      if (statusEl) { statusEl.textContent = 'Applying feedback, regenerating, and requeuing…'; statusEl.className = 'text-xs text-gray-400 mb-3'; }

      try {
        const res = await fetch(`/api/review-queue/${itemId}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ feedback }),
        });
        const data = await res.json();

        if (!res.ok) {
          if (statusEl) { statusEl.textContent = data.error || 'Feedback submission failed.'; statusEl.className = 'text-xs text-red-400 mb-3'; }
          return;
        }

        if (statusEl) { statusEl.textContent = `Requeued as ${data.queue_id || 'new item'}. Reloading…`; statusEl.className = 'text-xs text-teal-300 mb-3'; }
        setTimeout(() => load(), 1200);
      } catch (e) {
        if (statusEl) { statusEl.textContent = `Error: ${e.message}`; statusEl.className = 'text-xs text-red-400 mb-3'; }
      }
    }

    async function submitImageFeedback(itemId) {
      const inputEl = document.getElementById(`feedback-input-${itemId}`);
      const statusEl = document.getElementById(`feedback-status-${itemId}`);
      const feedback = (inputEl?.value || '').trim();

      if (!feedback) {
        if (statusEl) { statusEl.textContent = 'Describe the image issue before submitting.'; statusEl.className = 'text-xs text-red-400 mb-3'; }
        return;
      }

      if (statusEl) { statusEl.textContent = 'Applying feedback and rebuilding images — this takes ~30–60s…'; statusEl.className = 'text-xs text-gray-400 mb-3'; }

      try {
        const res = await fetch(`/api/review-queue/${itemId}/image-feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ feedback }),
        });
        const data = await res.json();

        if (!res.ok) {
          if (statusEl) { statusEl.textContent = data.error || 'Image feedback failed.'; statusEl.className = 'text-xs text-red-400 mb-3'; }
          return;
        }

        const updated = [];
        if (data.template_updated) updated.push('template');
        if (data.renderer_updated) updated.push('renderer prompt');
        if (data.perf_updated) updated.push('perf log');
        const metaInfo = updated.length ? ` · Updated: ${updated.join(', ')}.` : '';
        const templateInfo = data.template_id ? ` [${data.template_id}]` : '';

        if (data.images_regenerated) {
          if (statusEl) {
            statusEl.textContent = `Images rebuilt (${data.image_paths ? data.image_paths.length : 0} new).${templateInfo}${metaInfo} Reloading…`;
            statusEl.className = 'text-xs text-teal-300 mb-3';
          }
          setTimeout(() => load(), 1200);
        } else {
          const regenNote = data.regen_errors && data.regen_errors.length
            ? ` (Image rebuild skipped: ${data.regen_errors[0]})`
            : ' (No images to rebuild.)';
          if (statusEl) {
            statusEl.textContent = `Feedback recorded.${templateInfo}${metaInfo}${regenNote}`;
            statusEl.className = 'text-xs text-purple-300 mb-3';
          }
          setTimeout(() => toggleFeedbackPanel(itemId, null), 3000);
        }
      } catch (e) {
        if (statusEl) { statusEl.textContent = `Error: ${e.message}`; statusEl.className = 'text-xs text-red-400 mb-3'; }
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── On-demand image generation ─────────────────────────────────────────

    async function generateImage(itemId) {
      const btn = document.getElementById(`gen-img-btn-${itemId}`);
      const statusEl = document.getElementById(`gen-status-${itemId}`);

      if (btn) { btn.disabled = true; btn.textContent = '⏳ Generating…'; btn.className = btn.className.replace('hover:bg-gray-700', ''); }
      if (statusEl) { statusEl.textContent = 'Generating images — this takes 30–90s per slide…'; statusEl.className = 'text-xs text-blue-400 mb-3'; statusEl.classList.remove('hidden'); }

      try {
        const res = await fetch(`/api/review-queue/${itemId}/generate-image`, {
          method: 'POST',
          credentials: 'include',
        });
        const data = await res.json();

        if (!res.ok) {
          if (statusEl) { statusEl.textContent = data.error || 'Image generation failed.'; statusEl.className = 'text-xs text-red-400 mb-3'; }
          if (btn) { btn.disabled = false; btn.textContent = '🖼 Generate Image'; }
          return;
        }

        const count = (data.image_urls || []).length;
        if (statusEl) {
          statusEl.textContent = `${count} image${count !== 1 ? 's' : ''} generated. Reloading…`;
          statusEl.className = 'text-xs text-teal-300 mb-3';
        }
        setTimeout(() => load(), 800);
      } catch (e) {
        if (statusEl) { statusEl.textContent = `Error: ${e.message}`; statusEl.className = 'text-xs text-red-400 mb-3'; }
        if (btn) { btn.disabled = false; btn.textContent = '🖼 Generate Image'; }
      }
    }

    // ── On-demand video generation ─────────────────────────────────────────

    async function generateVideo(itemId) {
      const btn = document.getElementById(`gen-vid-btn-${itemId}`);
      const statusEl = document.getElementById(`gen-status-${itemId}`);

      if (btn) { btn.disabled = true; btn.textContent = '⏳ Generating video…'; }
      if (statusEl) {
        statusEl.textContent = 'Building video… (FFmpeg transitions take ~10s; AI video takes 2–5min)';
        statusEl.className = 'text-xs text-indigo-400 mb-3';
        statusEl.classList.remove('hidden');
      }

      try {
        const res = await fetch(`/api/review-queue/${itemId}/generate-video`, {
          method: 'POST',
          credentials: 'include',
        });
        const data = await res.json();

        if (!res.ok) {
          if (statusEl) { statusEl.textContent = data.error || 'Video generation failed.'; statusEl.className = 'text-xs text-red-400 mb-3'; }
          if (btn) { btn.disabled = false; btn.textContent = '🎬 Generate Video'; }
          return;
        }

        const modeLabel = data.mode === 'ai' ? 'AI video' : 'FFmpeg video';
        if (statusEl) {
          statusEl.textContent = `${modeLabel} ready. Reloading…`;
          statusEl.className = 'text-xs text-teal-300 mb-3';
        }

        // Inject video player immediately without full reload if we have the URL
        if (data.video_url) {
          const container = document.getElementById(`video-container-${itemId}`);
          if (container) {
            container.innerHTML = `
              <div class="mt-4">
                <div class="text-xs text-gray-500 uppercase tracking-widest mb-2">Generated Video</div>
                <video src="${data.video_url}" controls class="w-full rounded-lg border border-gray-800 max-h-96" style="background:#000;"></video>
              </div>`;
          }
        }

        setTimeout(() => load(), 1200);
      } catch (e) {
        if (statusEl) { statusEl.textContent = `Error: ${e.message}`; statusEl.className = 'text-xs text-red-400 mb-3'; }
        if (btn) { btn.disabled = false; btn.textContent = '🎬 Generate Video'; }
      }
    }

    async function approveItem(id) {
      const item = _lastQueueItems.find(i => i.id === id);
      const tmpl = item && item.template_meta;
      const hasVidDir = !!(tmpl && tmpl.video_transition);
      const btn = document.getElementById(`approve-btn-${id}`);
      const statusEl = document.getElementById(`gen-status-${id}`);

      if (hasVidDir) {
        // ── Step 1: generate video ──────────────────────────────────────
        if (btn) { btn.disabled = true; btn.textContent = '⏳ Building video…'; }
        if (statusEl) {
          statusEl.textContent = 'Building video… (FFmpeg ~10s · AI video ~2–5 min)';
          statusEl.className = 'text-xs text-indigo-400 mb-3';
          statusEl.classList.remove('hidden');
        }

        try {
          const vidRes = await fetch(`/api/review-queue/${id}/generate-video`, {
            method: 'POST',
            credentials: 'include',
          });
          const vidData = await vidRes.json();

          if (!vidRes.ok) {
            if (statusEl) { statusEl.textContent = vidData.error || 'Video generation failed.'; statusEl.className = 'text-xs text-red-400 mb-3'; }
            if (btn) { btn.disabled = false; btn.textContent = '✅ Approve + Video'; }
            return;
          }

          // Show video inline immediately
          if (vidData.video_url) {
            const container = document.getElementById(`video-container-${id}`);
            if (container) {
              container.innerHTML = `
                <div class="mt-4">
                  <div class="text-xs text-gray-500 uppercase tracking-widest mb-2">Generated Video</div>
                  <video src="${vidData.video_url}" controls class="w-full rounded-lg border border-gray-800 max-h-96" style="background:#000;"></video>
                </div>`;
            }
          }

          if (statusEl) { statusEl.textContent = 'Video ready. Removing from queue…'; statusEl.className = 'text-xs text-teal-300 mb-3'; }
        } catch (e) {
          if (statusEl) { statusEl.textContent = `Video error: ${e.message}`; statusEl.className = 'text-xs text-red-400 mb-3'; }
          if (btn) { btn.disabled = false; btn.textContent = '✅ Approve + Video'; }
          return;
        }
      }

      // ── Step 2: remove from queue (no Buffer publish) ──────────────────
      const res = await fetch(`/api/review-queue/${id}/approve`, { method: 'POST', credentials: 'include' });
      if (!res.ok) { alert('Approval failed'); return; }
      const panel = document.getElementById(`feedback-panel-${id}`);
      if (panel) panel.classList.add('hidden');
      await load();
    }

    async function rejectItem(id) {
      const res = await fetch(`/api/review-queue/${id}/reject`, { method: 'POST', credentials: 'include' });
      if (!res.ok) { alert('Rejection failed'); return; }
      const panel = document.getElementById(`feedback-panel-${id}`);
      if (panel) panel.classList.add('hidden');
      await load();
    }

    async function toggleAutoPublish() {
      const nextValue = !(publishSettings.auto_publish);
      await fetch("/api/publish-settings", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: 'include',
        body: JSON.stringify({ auto_publish: nextValue }),
      });
      await load();
    }

    load();
  </script>
</body>
</html>
